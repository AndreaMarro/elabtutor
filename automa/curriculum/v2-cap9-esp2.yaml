# Curriculum YAML — v2-cap9-esp2
# "Luce notturna automatica"

experiment_id: v2-cap9-esp2
volume: 2
chapter: 9
title: "Luce notturna automatica"

prerequisites:
  - v2-cap9-esp1

concepts_introduced:
  - luce_notturna
  - inversione_logica

vocabulary_level: v2
allowed_terms:
  - LED
  - batteria
  - filo
  - circuito
  - resistore
  - corrente
  - tensione
  - volt
  - fototransistor
  - transistor
