# Curriculum YAML — v2-cap6-esp3
# "Tre LED in serie"

experiment_id: v2-cap6-esp3
volume: 2
chapter: 6
title: "Tre LED in serie"

prerequisites:
  - v2-cap6-esp2

concepts_introduced:
  - tensione_distribuita
  - limite_batteria

vocabulary_level: v2
allowed_terms:
  - LED
  - batteria
  - filo
  - circuito
  - resistore
  - ohm
  - corrente
  - tensione
  - volt
  - serie
  - breadboard
  - anodo
  - catodo
