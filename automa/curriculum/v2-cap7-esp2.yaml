# Curriculum YAML — v2-cap7-esp2
# "Scarica con LED rosso"

experiment_id: v2-cap7-esp2
volume: 2
chapter: 7
title: "Scarica con LED rosso"

prerequisites:
  - v2-cap7-esp1

concepts_introduced:
  - scarica_visibile
  - energia_accumulata

vocabulary_level: v2
allowed_terms:
  - LED
  - batteria
  - filo
  - circuito
  - resistore
  - corrente
  - tensione
  - volt
  - condensatore
  - carica
  - scarica
  - energia
