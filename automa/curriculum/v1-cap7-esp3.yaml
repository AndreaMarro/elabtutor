teacher_briefing:
  before_class: >
    Stesso materiale. Obiettivo: completare la scoperta dei 3 canali.
    Il blu potrebbe apparire piu debole — e normale (Vf piu alta).
  during_class: >
    "Ultimo colore! Trovate il piedino del blu." Dopo: "Avete scoperto tutti
    e 3 i colori. Cosa notate? Il blu e uguale al rosso in luminosita?"
    Spesso il blu appare piu debole — ottima osservazione da discutere.
  common_question: >
    "Perche il blu e piu debole?" -> Il blu ha bisogno di piu energia per
    accendersi. Con la stessa resistenza, il rosso brilla di piu. E come
    salire scale di altezze diverse — il blu deve salire piu in alto.

common_mistakes:
  - mistake: "Il blu non si accende"
    what_to_do: "Prova con una resistenza piu piccola (220 ohm). Il blu ha bisogno di piu corrente"
    analogy: null

analogies:
  soglia_diversa_colore_blu:
    analogy: "Ogni colore del LED e come un atleta diverso: il rosso e un velocista che parte subito, il verde e un corridore medio, il blu e un maratoneta che ha bisogno di piu energia per partire ma poi brilla intensamente."
    evidence: "Analogia energetica per Vf diversa, scaffolding intuitivo (Driver et al. 1994)"

assessment_invisible:
  - "Se nota la differenza di luminosita blu vs rosso -> osservazione scientifica spontanea"
  - "Se chiede 'perche?' -> momento perfetto per discutere senza dare formule"
  - "Se vuole accendere tutti e 3 -> pronto per esp 4-5"
