# Curriculum YAML — v1-cap7-esp3
# "Accendi il blu del RGB"

experiment_id: v1-cap7-esp3
volume: 1
chapter: 7
title: "Accendi il blu del RGB"

prerequisites:
  - v1-cap7-esp2  # Sa accendere il verde del RGB

concepts_introduced:
  - canale_blu_RGB
  - tutti_e_tre_i_canali_scoperti
  - soglia_diversa_colore_blu

vocabulary_level: v1-cap7
allowed_terms:
  - LED
  - LED RGB
  - rosso
  - verde
  - blu
  - resistenza
  - ohm
  - corrente
  - catodo
  - anodo
  - breadboard
  - piedino
  - circuito
  - batteria
  - filo
  - pin
  - colore
forbidden_terms:
  - PWM
  - analogWrite
  - digitale
  - Arduino
  - codice
  - programma
