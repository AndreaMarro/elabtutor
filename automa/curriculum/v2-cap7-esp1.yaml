# Curriculum YAML — v2-cap7-esp1
# "Scarica condensatore + multimetro"

experiment_id: v2-cap7-esp1
volume: 2
chapter: 7
title: "Scarica condensatore + multimetro"

prerequisites:
  - v2-cap6-esp4

concepts_introduced:
  - condensatore
  - carica
  - scarica
  - tempo

vocabulary_level: v2
allowed_terms:
  - LED
  - batteria
  - filo
  - circuito
  - resistore
  - corrente
  - tensione
  - volt
  - condensatore
  - carica
  - scarica
  - multimetro
  - breadboard
  - tempo
  - secondi
forbidden_terms:
  - Arduino
  - codice
  - programma
