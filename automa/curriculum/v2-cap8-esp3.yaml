# Curriculum YAML — v2-cap8-esp3
# "MOSFET + pot + tensione soglia"

experiment_id: v2-cap8-esp3
volume: 2
chapter: 8
title: "MOSFET + pot + tensione soglia"

prerequisites:
  - v2-cap8-esp2

concepts_introduced:
  - soglia_MOSFET
  - controllo_graduale

vocabulary_level: v2
allowed_terms:
  - LED
  - batteria
  - filo
  - circuito
  - resistore
  - corrente
  - tensione
  - volt
  - MOSFET
  - gate
  - drain
  - source
  - potenziometro
  - soglia
  - breadboard
forbidden_terms:
  - Arduino
  - codice
  - programma
  - digitale
  - compilare
  - variabile
  - funzione
  - loop
