# Curriculum YAML — v1-cap7-esp1
# "Accendi il rosso del RGB"

experiment_id: v1-cap7-esp1
volume: 1
chapter: 7
title: "Accendi il rosso del RGB"

prerequisites:
  - v1-cap6-esp1  # Sa accendere un LED
  - v1-cap6-esp3  # Sa usare una resistenza

concepts_introduced:
  - LED_RGB
  - catodo_comune
  - pin_multipli

vocabulary_level: v1-cap7
allowed_terms:
  - LED
  - LED RGB
  - rosso
  - verde
  - blu
  - resistenza
  - ohm
  - corrente
  - catodo
  - anodo
  - breadboard
  - piedino
  - circuito
  - batteria
