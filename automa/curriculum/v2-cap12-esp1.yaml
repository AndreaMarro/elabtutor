# Curriculum YAML — v2-cap12-esp1
# "Robot Segui Luce"

experiment_id: v2-cap12-esp1
volume: 2
chapter: 12
title: "Robot Segui Luce"

prerequisites:
  - v2-cap10-esp4
  - v2-cap9-esp2

concepts_introduced:
  - progetto_finale_v2
  - robot_autonomo
  - fototransistor_motore

vocabulary_level: v2
allowed_terms:
  - LED
  - batteria
  - filo
  - circuito
  - resistore
  - corrente
  - tensione
  - volt
  - motore
