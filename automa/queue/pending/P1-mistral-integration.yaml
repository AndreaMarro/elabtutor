id: P1-mistral-integration
priority: P1
title: "Integrare Mistral come LLM produzione EU-safe"
description: |
  DECISIONE ANDREA 26/03/2026: Zero provider extra-EU in produzione.
  
  Architettura target:
  1. Brain V13 (Qwen locale VPS EU) fa routing intent
  2. Se needs_llm=false → Brain risponde direttamente (zero latenza, zero costo)
  3. Se needs_llm=true → Mistral API (EU, GDPR-safe) genera la risposta
  4. Mistral riceve il contesto dal Brain (intent, entities, volume, experiment)
  
  Implementazione:
  - Registrare account Mistral (mistral.ai) — API key
  - Aggiungere call_mistral() in nanobot server.py
  - Configurare Mistral come provider primario al posto di Anthropic
  - Testare latenza (target <3s) e qualita risposte
  - Mantenere Anthropic come fallback temporaneo durante la transizione
  
  Modello consigliato: mistral-large-latest (o mistral-medium per costo)
  Costo stimato: ~€0.002/risposta (10x meno di Claude)
  
  CRITICO: questo e' un prerequisito per vendere alle scuole.
  Senza GDPR-safe, nessuna scuola italiana puo adottare il prodotto.
target_files: "nanobot/server.py nanobot/prompts/tutor.yml"
created_at: "2026-03-26T17:30:00"
source: "decisione-andrea-gdpr-26-03-2026"
