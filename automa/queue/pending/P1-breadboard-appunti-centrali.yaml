id: P1-breadboard-appunti-centrali
priority: P1
title: "breadboard-appunti-centrali"
description: |
  Gli strumenti di annotazione devono sembrare CENTRALI, non un overlay nascosto. La penna deve essere fluida come una lavagna vera. I colori devono essere quelli dei pennarelli da lavagna (nero, rosso, blu, verde). L'insegnante deve poter scrivere sulla breadboard come se fosse la sua lavagna.
