<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160" fill="none">
  <!-- UNLIM Robot — Mascotte ELAB reale -->
  <!-- Robot con spina elettrica, occhi asimmetrici, cuffia laterale -->

  <!-- Antenna — forma a U rovesciata con pallina -->
  <line x1="75" y1="18" x2="75" y2="6" stroke="#1E4D8C" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="6" x2="82" y2="6" stroke="#1E4D8C" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="6" x2="82" y2="14" stroke="#1E4D8C" stroke-width="3" stroke-linecap="round"/>
  <circle cx="82" cy="16" r="4" fill="#1E4D8C" class="antenna-tip"/>

  <!-- Cuffia/orecchio sinistro -->
  <circle cx="30" cy="52" r="12" fill="#1E4D8C" class="headphone"/>
  <circle cx="30" cy="52" r="7" fill="#E8F0FE"/>
  <circle cx="30" cy="52" r="3" fill="#1E4D8C"/>

  <!-- Testa — rettangolo arrotondato con bordo lime -->
  <rect x="36" y="18" width="68" height="58" rx="14" fill="#4A7A25"/>
  <rect x="40" y="22" width="60" height="50" rx="11" fill="#1E4D8C"/>
  <!-- Faccia bianca -->
  <rect x="46" y="28" width="48" height="38" rx="8" fill="#FFFFFF"/>

  <!-- Occhio sinistro (più grande) -->
  <circle cx="62" cy="48" r="10" fill="#1E4D8C" class="eye eye-left"/>
  <!-- Occhio destro (più piccolo) -->
  <circle cx="82" cy="48" r="7" fill="#1E4D8C" class="eye eye-right"/>

  <!-- Body — rettangolo -->
  <rect x="44" y="80" width="52" height="36" rx="6" fill="#1E4D8C"/>
  <!-- Cintura/dettaglio corpo -->
  <rect x="50" y="92" width="40" height="4" rx="2" fill="#E8F0FE" opacity="0.3"/>

  <!-- Braccio sinistro -->
  <rect x="28" y="84" width="16" height="7" rx="3.5" fill="#1E4D8C" class="arm-left"/>

  <!-- Braccio destro + spina elettrica -->
  <rect x="96" y="84" width="16" height="7" rx="3.5" fill="#1E4D8C" class="arm-right"/>
  <!-- Spina elettrica -->
  <rect x="112" y="80" width="18" height="14" rx="3" fill="#4A7A25" class="plug-body"/>
  <rect x="130" y="82" width="6" height="4" rx="1" fill="#7CB342"/>
  <rect x="130" y="88" width="6" height="4" rx="1" fill="#7CB342"/>
  <!-- Scintilla -->
  <line x1="138" y1="84" x2="143" y2="81" stroke="#7CB342" stroke-width="2" stroke-linecap="round" class="spark"/>
  <line x1="138" y1="88" x2="142" y2="91" stroke="#7CB342" stroke-width="2" stroke-linecap="round" class="spark"/>

  <!-- Gambe -->
  <rect x="52" y="116" width="10" height="16" rx="3" fill="#1E4D8C"/>
  <rect x="78" y="116" width="10" height="16" rx="3" fill="#1E4D8C"/>
  <!-- Piedi -->
  <rect x="48" y="130" width="16" height="8" rx="4" fill="#1E4D8C"/>
  <rect x="76" y="130" width="16" height="8" rx="4" fill="#1E4D8C"/>
</svg>
