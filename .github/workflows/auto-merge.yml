# ============================================
# Auto-merge soft per PR fidate (es. Tea)
# Trigger: PR con label `auto-merge` + autore in allowlist
# Effetto: abilita auto-merge nativo GitHub (squash)
# Merge effettivo: solo quando branch protection (CI verde) lo consente
# Reversibile: rimuovi questo file o togli la label
# ============================================

name: Auto-merge

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    if: >
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      github.event.pull_request.base.ref == 'main'

    steps:
      - name: Check author allowlist
        id: allowlist
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          # Aggiungi qui i login GitHub autorizzati (separati da spazio)
          ALLOWED_AUTHORS: "tea-bot tea andreamarro"
        run: |
          if echo " $ALLOWED_AUTHORS " | grep -q " $PR_AUTHOR "; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "PR author $PR_AUTHOR is in allowlist"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "PR author $PR_AUTHOR NOT in allowlist — skipping"
          fi

      - name: Enable GitHub native auto-merge (squash)
        if: steps.allowlist.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --squash \
            --delete-branch
