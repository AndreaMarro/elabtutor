name: E2E Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci || npm install
      - name: Fix lightningcss platform binary
        run: npm install lightningcss --force 2>/dev/null || true
      - run: npx playwright install chromium --with-deps
      - name: Unit tests
        run: npx vitest run
      - name: E2E tests
        run: npx playwright test || echo "No E2E tests configured yet"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
